            font-size: 12px;

            margin-bottom: 8px;

            background: #10b981;

            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;

            background: #6b7280;
        }

            border: 2px solid #e5e7eb;

            padding: 12px 16px;
            font-size: 15px;

            padding: 40px 20px;
            color: #6b7280;
        }

            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;

        }

            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;

            contenido: p.contenido.replace(/\\n/g, '\n')
        }));

        // Cargar categorías en el selector
        const categories = [...new Set(plantillas.map(p => p.categoria))];
        const categoryFilter = document.getElementById('categoryFilter');
        categories.forEach(cat => {
            const option = document.createElement('option');
            option.value = cat;
            option.textContent = cat;
            categoryFilter.appendChild(option);
        });
        
        // Actualizar contador
        document.getElementById('totalCount').textContent = plantillas.length;

        function render() {
            const container = document.getElementById('templatesContainer');
            const noResults = document.getElementById('noResults');
            
            if (filteredPlantillas.length === 0) {
                container.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            container.innerHTML = filteredPlantillas.map(p => {
                const preview = p.contenido.replace(/\n/g, ' ').substring(0, 150) + '...';
                let tagBadge = '';
                if (p.tag === 'CSOP') {
                    tagBadge = '<span class="category-badge badge-csop">CSOP</span>';
                } else if (p.tag === 'COSP') {
                    tagBadge = '<span class="category-badge badge-cosp">COSP</span>';
                } else if (p.tag === 'GENERAL') {
                    tagBadge = '<span class="category-badge badge-general">🌍 GENERAL</span>';
                }
                
                return `
                <div class="card-template bg-white rounded-lg shadow p-6" style="border-left-color: #${getColorForCategory(p.categoria)}">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-1">
                            <h3 class="text-lg font-bold text-gray-900 mb-2">${escapeHtml(p.nombre)}</h3>
                            <div class="flex flex-wrap gap-2">
                                <span class="category-badge" style="background-color: #${getColorForCategory(p.categoria)}22; color: #${getColorForCategory(p.categoria)}">${escapeHtml(p.categoria)}</span>
                                ${tagBadge}
                            </div>
                        </div>
                    </div>
                    <p class="text-gray-600 text-sm mb-4 line-clamp-3">${escapeHtml(preview)}</p>
                    <div class="flex gap-2">
                        <button class="copy-btn flex-1" onclick="copyToClipboard('${p.id}')">
                            <i class="fas fa-copy mr-1"></i>Copiar
                        </button>
                        <button class="copy-btn flex-1" onclick="openModal('${p.id}')">
                            <i class="fas fa-eye mr-1"></i>Ver completo
                        </button>
                    </div>
                </div>
            `;
            }).join('');

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function getColorForCategory(cat) {
            const colors = {
                "Plazo de entrega": "0891B2",
                "Experiencia de Servicio": "F59E0B",
                "Solicitud del Cliente": "10B981",
                "Escalada de insatisfacción": "8B5CF6",
                "Otras Consultas": "6366F1",
                "Sesiones Inválidas": "DC2626"
            };
            return colors[cat] || "6B7280";
        }

        function filter() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            
            filteredPlantillas = plantillas.filter(p => {
                const matchSearch = !search || p.nombre.toLowerCase().includes(search) || 
                                   p.contenido.toLowerCase().includes(search);
                const matchCategory = !category || p.categoria === category;
                
                return matchSearch && matchCategory;
            });
            
            render();
        }

        function copyToClipboard(id) {
            const p = plantillas.find(x => x.id == id);
            navigator.clipboard.writeText(p.contenido).then(() => {
                const btn = event.target.closest('.copy-btn');
                const oldText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check mr-1"></i>¡Copiado!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.innerHTML = oldText;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function openModal(id) {
            const p = plantillas.find(x => x.id == id);
            document.getElementById('modalTitle').textContent = p.nombre;
            document.getElementById('modalContent').textContent = p.contenido;
            document.getElementById('contentModal').classList.add('active');
            document.getElementById('contentModal').dataset.currentId = id;
        }

        function closeModal() {
            document.getElementById('contentModal').classList.remove('active');
        }

        function copyFromModal() {
            const id = document.getElementById('contentModal').dataset.currentId;
            copyToClipboard(id);
        }

        document.getElementById('searchInput').addEventListener('input', filter);
        document.getElementById('categoryFilter').addEventListener('change', filter);
        document.getElementById('contentModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Cargar por defecto
        render();
    </script>
